{{- $tag := printf "h%d" .Level -}}
{{- printf `<%s id="%s">` $tag .Anchor | safeHTML -}}
  {{- .Text | safeHTML -}}
  <a
    href="#{{ .Anchor }}"
    class="heading-anchor"
    aria-label="{{ i18n "heading.anchor" | default "Link to this section" }}"
  >
    {{- partial "features/icon.html" (dict "name" "link" "size" "sm" "hidden" true) -}}
  </a>
{{- printf `</%s>` $tag | safeHTML -}}
